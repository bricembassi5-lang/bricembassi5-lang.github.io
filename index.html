<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brice Mbassi — Mes Réseaux</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1a2a6c 0%, #0f1a45 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  .card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px;
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 400px;
    text-align: center;
  }
  .avatar {
    width: 90px; height: 90px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid #FF8C00;
    box-shadow: 0 0 24px rgba(255,140,0,0.3);
    margin-bottom: 1rem;
  }
  h1 {
    color: #fff;
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 0.2rem;
  }
  .subtitle {
    color: #FF8C00;
    font-size: 0.78rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }
  .tagline {
    color: rgba(255,255,255,0.5);
    font-size: 0.8rem;
    margin-bottom: 2rem;
    font-style: italic;
  }
  .links { display: flex; flex-direction: column; gap: 0.9rem; margin-bottom: 2rem; }
  .link-btn {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 0.95rem 1.4rem;
    border-radius: 12px;
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 500;
    transition: all 0.2s;
    border: 1px solid transparent;
  }
  .link-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
  .link-btn .icon { font-size: 1.3rem; flex-shrink: 0; }
  .link-btn .label { flex: 1; text-align: left; }
  .link-btn .arrow { opacity: 0.5; font-size: 0.9rem; }

  .btn-linkedin { background: #0077B5; color: #fff; }
  .btn-instagram { background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); color: #fff; }
  .btn-whatsapp { background: #25D366; color: #fff; }
  .btn-email { background: rgba(255,255,255,0.1); color: #fff; border-color: rgba(255,255,255,0.2); }
    .btn-facebook { background: #1877F2; color: #fff; }
    .btn-portfolio { background: linear-gradient(135deg, #1a2a6c, #FF8C00); color: #fff; }

  .divider {
    color: rgba(255,255,255,0.2);
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }
  .footer-text {
    color: rgba(255,255,255,0.25);
    font-size: 0.7rem;
    margin-top: 1.5rem;
  }
</style>
</head>
